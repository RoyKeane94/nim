<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Writing Interface - Notes in Margin{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'blog/css/style.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body class="write-interface">
    <header class="write-header">
        <div class="write-header-content">
            <h1><a href="{% url 'write_dashboard' %}">Writing Interface</a></h1>
            <nav>
                <a href="{% url 'write_dashboard' %}">Dashboard</a>
                <a href="{% url 'home' %}">View Site</a>
                <a href="{% url 'logout' %}">Logout</a>
            </nav>
        </div>
    </header>
    
    <main class="write-main">
        {% block content %}{% endblock %}
    </main>
    
    <script src="{% static 'blog/js/editor.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
