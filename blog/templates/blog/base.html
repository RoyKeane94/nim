<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Notes in the Margin{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'blog/css/style.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="margin-line"></div>
    
    <header class="site-header">
        <div class="container">
            <h1 class="site-title">
                <a href="{% url 'home' %}">Notes in the Margin</a>
                <span class="pulsing-dot"></span>
            </h1>
            <nav class="main-nav">
                <a href="{% url 'home' %}">Home</a>
                <a href="{% url 'archive' %}">Archive</a>
            </nav>
        </div>
    </header>
    
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>
    
    <footer class="site-footer">
        <div class="container">
            <div class="newsletter-signup">
                <h2>Stay Updated</h2>
                <p>Get notified when new distillations are published.</p>
                <form id="newsletter-form" method="post" action="{% url 'subscribe' %}">
                    {% csrf_token %}
                    <input type="email" name="email" placeholder="Enter your email" required>
                    <button type="submit">Subscribe</button>
                </form>
                <div id="newsletter-message"></div>
            </div>
        </div>
    </footer>
    
    <script src="{% static 'blog/js/filters.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
