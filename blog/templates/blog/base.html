<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Notes in Margin{% endblock %}</title>
    {% load static %}
    <link rel="icon" href="{% static 'blog/favicon.png' %}" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=Libre+Baskerville:ital@1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'blog/css/home.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body>
<div class="page-wrapper">
<!-- NAV -->
<nav class="site-nav">
    <a class="nav-brand" href="{% url 'home' %}">
        <span class="nav-title">Notes in the Margin</span>
        <span class="nav-dot"></span>
    </a>
    <ul class="nav-links">
        <li><a href="{% url 'home' %}">Home</a></li>
        <li><a href="{% url 'library' %}">Library</a></li>
    </ul>
</nav>

<main class="main-grow">
{% block content %}{% endblock %}
</main>

<!-- FOOTER -->
<footer class="site-footer">
    <span class="footer-brand">Notes in the Margin <span class="footer-dot">•</span></span>
    <span class="footer-note">A library, not a feed.</span>
</footer>
</div>

<script src="{% static 'blog/js/filters.js' %}"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
